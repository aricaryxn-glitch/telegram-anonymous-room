services:
  - type: web
    name: telegram-anonymous-room
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PASSWORD_PEPPER
        sync: false
      - key: ROOM_SIZE
        value: "5"
      - key: MESSAGE_TTL_MS
        value: "3600000"
